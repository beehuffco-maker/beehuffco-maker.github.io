<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blake Huff — Developer</title>
  <meta name="description" content="Developer tools and automation built by Blake Huff." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 48px 40px 0; max-width: 860px; margin: 0 auto; width: 100%; }
    .wordmark { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #888; }
    main { flex: 1; display: flex; align-items: center; padding: 60px 40px; max-width: 860px; margin: 0 auto; width: 100%; }
    .hero h1 { font-size: clamp(36px, 6vw, 64px); font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; color: #f5f5f5; margin-bottom: 20px; }
    .hero h1 span { color: #666; }
    .hero p { font-size: 18px; line-height: 1.6; color: #888; max-width: 500px; margin-bottom: 40px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; background: #161616; border: 1px solid #2a2a2a; border-radius: 100px; padding: 8px 16px; font-size: 13px; color: #666; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a7d44; box-shadow: 0 0 6px #3a7d44; }
    footer { padding: 32px 40px; max-width: 860px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; }
    footer p { font-size: 13px; color: #444; }
    footer a { font-size: 13px; color: #555; text-decoration: none; }
    footer a:hover { color: #999; }
  </style>
</head>
<body>
  <header><div class="wordmark">Blake Huff</div></header>
  <main>
    <div class="hero">
      <h1>Building tools<br /><span>that run themselves.</span></h1>
      <p>Automation, content operations, and platform integrations. Currently building social media and marketing systems for fine art businesses.</p>
      <div class="badge"><span class="badge-dot"></span>Available for projects</div>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Blake Huff</p>
    <a href="/privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
